name: driving_test_prep
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # Network
  http: ^1.2.0

  # hình ảnh
  image_picker: ^1.0.4
  image: ^4.1.3

  # Auth
  google_sign_in: ^6.2.1

  # Database - Drift ORM
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.0
  sqlite3: ^2.4.0

  # Utils
  path_provider: ^2.1.2
  path: ^1.8.3

  # Bản đồ OSM
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  cloud_firestore: ^6.2.0
  app_links: ^7.0.0
  shared_preferences: ^2.5.5
  mailer: ^6.1.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

  # Drift code generation
  drift_dev: ^2.18.0           # phải cùng version với drift
  build_runner: ^2.4.0


flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_app.png"

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
    - assets/images/questions/
    - assets/json/questions/
    - assets/json/ranks/
    - assets/json/topics/
    - assets/json/exam_groups/
    - assets/json/ranks/
    - assets/json/exam_sets/
    - assets/json/exam_sets_questions/
    - assets/json/traffic_signs/
    - assets/images/bien-bao/bien-cam/
    - assets/images/bien-bao/bien-canh-bao/
    - assets/images/bien-bao/bien-chi-dan/
    - assets/images/bien-bao/bien-hieu-lenh/
    - assets/images/bien-bao/bien-phu/
    - assets/images/bien-bao/bien-tren-cao-toc/